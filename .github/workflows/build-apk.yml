name: Diagnostic Project Structure
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Extract Project
        run: unzip immodjibouti-source.zip -d project_folder

      - name: List All Files
        run: |
          echo "--- Contenu du dossier extrait ---"
          find project_folder -maxdepth 3
